<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Каталог растений</title>
  <style>
    body {
        font-family: Arial, sans-serif;
        background-color: #e9e4d8;
        margin: 0 auto;
        padding: 0;
        max-width: 1200px;
    }
    header {
        background-color: #b3e283;
        display: flex;
        justify-content: flex-start; /* Сдвигаем все элементы влево */
        align-items: center;
        padding: 10px;
        border-radius: 0 0 20px 20px;
    }
    .logo {
        width: 100px;
        height: 50px;
        background-color: #6fbf73;
        margin-left: 10px;
        margin-right: 15px;
        border-radius: 10px;
    }
    .search-bar {
        display: flex;
        align-items: center;
        background-color: #8bc34a;
        border-radius: 20px;
        padding: 5px;
        margin-left: 0;
    }
    .search-input {
        width: 300px;
        padding: 8px;
        border: none;
        border-radius: 15px;
        margin-right: 5px;
        outline: none;
    }
    .search-button {
        background-color: #6fbf73;
        padding: 8px 12px;
        border: none;
        border-radius: 15px;
        color: white;
        cursor: pointer;
    }
    .carousel {
        background-color: #b3e283;
        height: 250px;
        margin: 20px 0;
        border-radius: 15px;
    }
    .catalog {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        padding: 20px;
        justify-content: center;
        max-width: 1200px;
        margin: 0 auto;
    }
    .card {
        background-color: #D2E1C4;
        width: 160px;
        height: 160px;
        border-radius: 10px;
        border: 2px solid #8bc34a;
        padding: 10px;

    }
    .pagination {
        display: flex;
        justify-content: center;
        padding: 10px;
    }
    .page-number {
        margin: 0 5px;
        padding: 5px 10px;
        background-color: #8bc34a;
        color: white;
        border-radius: 5px;
        cursor: pointer;
    }
  </style>
</head>
<body>
<header>
  <div class="logo"></div>
  <div class="search-bar">
    <input type="text" class="search-input" placeholder="Поиск...">
    <button class="search-button">🔍</button>
  </div>
  <div class="logo" style="margin-left: 420px;"></div>
  <div class="logo" style="margin-left: 10px;"></div>
</header>
<div class="carousel"></div>
<main>
  <section class="catalog">
    <div class="card">Товар 1</div>
    <div class="card">Товар 2</div>
    <div class="card">Товар 3</div>
    <div class="card">Товар 4</div>
    <div class="card">Товар 5</div>
    <div class="card">Товар 6</div>
    <div class="card">Товар 7</div>
    <div class="card">Товар 8</div>
    <div class="card">Товар 9</div>
    <div class="card">Товар 10</div>
    <div class="card">Товар 11</div>
    <div class="card">Товар 12</div>
  </section>
  <div class="pagination">
    <span class="page-number">1</span>
    <span class="page-number">2</span>
    <span class="page-number">3</span>
    <span class="page-number">4</span>
    <span class="page-number">5</span>
  </div>
</main>
</body>
</html>
